[settings]
install_before = "7d"

[tools]
python = "3.13"
uv = "latest"
rumdl = "latest"

[tasks.init]
description = "プロジェクトの初期設定をする"
quiet = true
run = ["mise install", "uv sync --all-extras"]

[tasks.upgrade]
description = "依存関係を最新にアップグレード"
quiet = true
run = 'uv sync --upgrade'

[tasks.test]
description = "ユニットテストを実行"
quiet = true
run = "uv run pytest tests/ -v"

[tasks.check]
description = "コードスタイルとドキュメントスタイルをチェック"
quiet = true
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "uv run mdformat --check .",
  "rumdl check .",
]

[tasks.format]
quiet = true
description = "ruff と rumdl でコードとドキュメントを自動整形"
run = [
  "uv run ruff format .",
  "uv run ruff check . --fix",
  "uv run mdformat .",
  "rumdl check --fix .",
]

[tasks.encrypt]
description = "File や Directory をパスワード付き ZIP に圧縮"
quiet = true
usage = 'arg "<target>" help="圧縮対象の File または Directory"'
run = "uv run python -m zipper -e -c ${usage_target}"
run_windows = 'uv run python -m zipper -e -c %usage_target%'

[tasks.decrypt]
description = "パスワード付き ZIP を解凍"
quiet = true
usage = 'arg "<target>" help="解凍対象の ZIP File"'
run = "uv run python -m zipper -x ${usage_target}"
run_windows = 'uv run python -m zipper -x %usage_target%'
